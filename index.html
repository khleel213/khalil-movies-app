<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer | Eng. Khalil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-image" class="background-poster"></div>
    <div class="overlay"></div>

    <main class="app-container">
        <header>
            <div class="logo">
                <h1>🎬 Eng. Khalil <span>Movies</span></h1>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for a movie... (Press Enter)">
            </div>
        </header>

        <div id="ui-state" class="ui-state">
            <h2 id="state-message">Loading movies...</h2>
        </div>

        <section id="movie-details" class="movie-details hidden">
            <h2 id="movie-title">Movie Title</h2>
            <div class="movie-meta">
                <span id="movie-rating">⭐ 0.0</span>
                <span id="movie-year">Year</span>
                <span id="movie-duration">Duration</span>
                <span id="movie-genre">Genre</span>
            </div>
        </section>

        <section class="carousel-section">
            <button id="btn-left" class="carousel-btn">&lt;</button>
            <div id="movies-list" class="movies-list">
                </div>
            <button id="btn-right" class="carousel-btn">&gt;</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
